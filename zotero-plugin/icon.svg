<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- vivid base gradient (deep indigo -> violet) -->
    <linearGradient id="bg" x1="0" y1="0" x2="0.35" y2="1">
      <stop offset="0" stop-color="#5157e8"/>
      <stop offset="0.55" stop-color="#6a3ef0"/>
      <stop offset="1" stop-color="#7a2ee6"/>
    </linearGradient>
    <radialGradient id="dome" cx="0.5" cy="0" r="0.9">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.5"/>
      <stop offset="0.45" stop-color="#ffffff" stop-opacity="0.1"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="vignette" cx="0.5" cy="0.42" r="0.78">
      <stop offset="0.6" stop-color="#000000" stop-opacity="0"/>
      <stop offset="1" stop-color="#24106a" stop-opacity="0.4"/>
    </radialGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="0.4" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.58"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0.3"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0.16"/>
    </linearGradient>
    <linearGradient id="sheen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="rss" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#dfe4ff"/>
    </linearGradient>
    <filter id="soft" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#1a0c52" flood-opacity="0.38"/>
    </filter>
    <filter id="glow" x="-70%" y="-70%" width="240%" height="240%">
      <feDropShadow dx="0" dy="0" stdDeviation="2.4" flood-color="#ffffff" flood-opacity="0.45"/>
    </filter>
  </defs>

  <!-- base tile: rx30 -->
  <rect x="4" y="4" width="120" height="120" rx="30" fill="url(#bg)"/>
  <rect x="4" y="4" width="120" height="120" rx="30" fill="url(#dome)"/>
  <rect x="4" y="4" width="120" height="120" rx="30" fill="url(#vignette)"/>
  <rect x="5.2" y="5.2" width="117.6" height="117.6" rx="28.8"
        fill="none" stroke="#ffffff" stroke-opacity="0.32" stroke-width="1.4"/>

  <!-- glass document panel, horizontally centred (x35..93, centre 64), top
       inset 14 so top corner centres stay on y=34 (= 4+30 = 18+16), rx=16 -->
  <g filter="url(#soft)">
    <rect x="30" y="18" width="58" height="92" rx="16" fill="url(#glass)"/>
  </g>
  <rect x="30.8" y="18.8" width="56.4" height="90.4" rx="15.2"
        fill="none" stroke="#ffffff" stroke-opacity="0.65" stroke-width="1.3"/>
  <rect x="35" y="23" width="48" height="15" rx="7.5" fill="url(#sheen)" opacity="0.5"/>

  <!-- RSS feed mark, top-right corner. Nudged down (arc centre at 77,42) so the
       outer wave clears the tile's rounded border; waves still burst
       up-and-right onto the background. -->
  <g filter="url(#glow)">
    <g fill="none" stroke="url(#rss)" stroke-width="6.5" stroke-linecap="round">
      <path d="M77 26 a16 16 0 0 1 16 16"/>
      <path d="M77 16 a26 26 0 0 1 26 26"/>
    </g>
    <circle cx="77" cy="42" r="5.5" fill="url(#rss)"/>
  </g>

  <!-- document text lines (translucent) -->
  <rect x="41" y="66" width="34" height="5.5" rx="2.75" fill="#ffffff" fill-opacity="0.72"/>
  <rect x="41" y="79" width="30" height="5.5" rx="2.75" fill="#ffffff" fill-opacity="0.6"/>
  <rect x="41" y="92" width="22" height="5.5" rx="2.75" fill="#ffffff" fill-opacity="0.48"/>
</svg>
