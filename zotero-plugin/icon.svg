<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- light frosted-glass tile -->
    <linearGradient id="tile" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0" stop-color="#fdfdff"/>
      <stop offset="0.5" stop-color="#eef0f9"/>
      <stop offset="1" stop-color="#e0e3f1"/>
    </linearGradient>
    <radialGradient id="dome" cx="0.5" cy="-0.05" r="0.85">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.9"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0.15"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <!-- Zotero red, with glassy volume -->
    <linearGradient id="zred" x1="0" y1="0" x2="0.25" y2="1">
      <stop offset="0" stop-color="#f4756a"/>
      <stop offset="0.5" stop-color="#dd3a3d"/>
      <stop offset="1" stop-color="#b51e2b"/>
    </linearGradient>
    <linearGradient id="zsheen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.65"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <filter id="zshadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="2.5" stdDeviation="3" flood-color="#8a1220" flood-opacity="0.35"/>
    </filter>
    <filter id="rssShadow" x="-60%" y="-60%" width="220%" height="220%">
      <feDropShadow dx="0" dy="1" stdDeviation="1.2" flood-color="#b51e2b" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- glass tile -->
  <rect x="4" y="4" width="120" height="120" rx="28" fill="url(#tile)"/>
  <rect x="4" y="4" width="120" height="120" rx="28" fill="url(#dome)"/>
  <!-- crisp rim light -->
  <rect x="5.3" y="5.3" width="117.4" height="117.4" rx="26.7"
        fill="none" stroke="#ffffff" stroke-opacity="0.9" stroke-width="1.5"/>
  <rect x="4.7" y="4.7" width="118.6" height="118.6" rx="27.4"
        fill="none" stroke="#c3c7dc" stroke-opacity="0.5" stroke-width="0.8"/>

  <!-- Zotero "Z", glossy glass letterform, centred -->
  <g filter="url(#zshadow)">
    <path d="M38 38 H90 V51 L57 79 H90 V92 H38 V79 L71 51 H38 Z" fill="url(#zred)"/>
  </g>
  <!-- specular sheen across the top bar of the Z -->
  <rect x="43" y="40.5" width="42" height="6" rx="3" fill="url(#zsheen)"/>

  <!-- RSS feed mark, top-right — enlarged for emphasis (this is a feed plugin) -->
  <g filter="url(#rssShadow)">
    <g fill="none" stroke="#dd3a3d" stroke-width="6" stroke-linecap="round">
      <path d="M86 30 a15 15 0 0 1 15 15"/>
      <path d="M86 18 a27 27 0 0 1 27 27"/>
    </g>
    <circle cx="87" cy="45" r="5" fill="#dd3a3d"/>
  </g>
</svg>
